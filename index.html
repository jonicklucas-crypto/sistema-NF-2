<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema NF Profissional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body { font-family:Arial; margin:0; background:#f4f6f9; }
.menu { width:220px; height:100vh; position:fixed; background:#2c3e50; color:white; }
.menu button { width:100%; padding:15px; border:none; background:none; color:white; cursor:pointer; }
.menu button:hover { background:#1abc9c; }
.conteudo { margin-left:220px; padding:20px; }
input { padding:10px; margin:5px 0; width:100%; }
button { padding:10px; background:#1abc9c; color:white; border:none; cursor:pointer; margin:5px; }
table { width:100%; border-collapse:collapse; background:white; font-size:12px; }
th, td { padding:6px; border:1px solid #ddd; white-space:nowrap; }

.cancelada { background:#ffcccc; }
.entrada { background:#fff3cd; }
.recebidoOK { background:#d4edda !important; }
.sapOK { background:#cce5ff !important; }
</style>
</head>

<body>

<div id="loginTela">
<div style="background:#fff;padding:30px;border-radius:10px;">
<h2>Login</h2>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div id="app" style="display:none;">

<div class="menu">
<button onclick="tela('notas')">Notas</button>
<button onclick="tela('recebidas')">Notas Recebidas</button>
<button onclick="tela('receb')">Recebimento</button>
<button onclick="tela('sap')">SAP</button>
<button onclick="tela('excel')">Importar Excel</button>
<button onclick="logout()">Sair</button>
</div>

<div class="conteudo">

<div id="notas">
<h2>Notas Fiscais</h2>
<div id="contador"></div>
<input id="busca" onkeyup="filtrar()" placeholder="Buscar">
<input id="chaveApagar" placeholder="Chave para apagar">
<button onclick="apagarUma()">Apagar Nota</button>
<button onclick="apagarTudo()">Apagar Todas</button>
<table id="tabela"></table>
</div>

<div id="recebidas" style="display:none;">
<h2>Notas Recebidas</h2>
<table id="tabelaRecebidas"></table>
</div>

<div id="receb" style="display:none;">
<h2>Recebimento</h2>
<input id="chaveReceb" oninput="buscarReceb()">
<input id="numReceb" readonly>
<input id="razaoReceb" readonly>
<input id="valorReceb" readonly>
<input id="pedidoReceb" placeholder="Pedido">
<button onclick="confirmarReceb()">Confirmar</button>
<button onclick="estornarReceb()">Estornar</button>
</div>

<div id="sap" style="display:none;">
<h2>SAP</h2>
<input id="chaveSAP" oninput="buscarSAP()">
<input id="numSAP" readonly>
<input id="razaoSAP" readonly>
<input id="valorSAP" readonly>
<button onclick="confirmarSAP()">Confirmar</button>
<button onclick="estornarSAP()">Estornar</button>
</div>

<div id="excel" style="display:none;">
<h2>Importar Excel</h2>
<input type="file" id="file">
<button onclick="importar()">Importar</button>
</div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCs61LRkdUTqeFv_qJvTb5vc1h8qwI5yYQ",
  authDomain: "sistemanf.firebaseapp.com",
  projectId: "sistemanf",
  storageBucket: "sistemanf.appspot.com",
  messagingSenderId: "87632051913",
  appId: "1:87632051913:web:438fc247703c2fb8915718"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let notas = [];

function formatarData(data){
if(!data) return "";
let d = new Date(data);
if(!isNaN(data)) d = new Date((data - 25569) * 86400 * 1000);
return new Date(d.getTime() + (d.getTimezoneOffset()*60000)).toLocaleDateString('pt-BR');
}

function autoSalvar(){
let batch = db.batch();
notas.forEach(n=> batch.set(db.collection("notas").doc(n.chave), n));
batch.commit();
}

function entrar(){
firebase.auth().signInWithEmailAndPassword(user.value, pass.value)
.then(()=>{
loginTela.style.display="none";
app.style.display="block";
carregar();
})
.catch(()=>alert("Login inválido"));
}

function logout(){
firebase.auth().signOut().then(()=>{
app.style.display="none";
loginTela.style.display="flex";
});
}

function tela(t){
["notas","recebidas","receb","sap","excel"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(t).style.display="block";
}

function carregar(){
db.collection("notas").get().then(s=>{
notas = s.docs.map(d=>d.data());
render();
});
}

function buscar(c){ return notas.find(n=>n.chave===c); }

function filtrar(){
let t=busca.value.toLowerCase();
document.querySelectorAll("#tabela tr").forEach((l,i)=>{
if(i==0)return;
l.style.display=l.innerText.toLowerCase().includes(t)?"":"none";
});
}

/* RECEBIMENTO */
function buscarReceb(){
let n = buscar(chaveReceb.value);
if(!n) return;
numReceb.value = n.numero||"";
razaoReceb.value = n.razaoEmit||"";
valorReceb.value = n.valor||"";
}

function confirmarReceb(){
let n = buscar(chaveReceb.value);
if(!n) return alert("Nota não encontrada");

if(n.recebido==="SIM") return alert("Nota já recebida");

if(!pedidoReceb.value)
if(!confirm("Nota sem pedido, deseja continuar?")) return;

let dup = notas.find(x=> x.pedido===pedidoReceb.value && x.chave!==n.chave);

if(dup)
if(!confirm(`Pedido encontra-se na nota ${dup.numero}, deseja continuar?`)) return;

n.recebido="SIM";
n.statusTela="recebidas";
n.pedido=pedidoReceb.value||"";

autoSalvar(); render();
}

function estornarReceb(){
let n = buscar(chaveReceb.value);
if(!n) return;

n.recebido="NAO";
n.statusTela="notas";
n.pedido="";

autoSalvar(); render();
}

/* SAP */
function buscarSAP(){
let n = buscar(chaveSAP.value);
if(!n) return;
numSAP.value = n.numero||"";
razaoSAP.value = n.razaoEmit||"";
valorSAP.value = n.valor||"";
}

function confirmarSAP(){
let n = buscar(chaveSAP.value);
if(!n) return alert("Nota não encontrada");

if(n.sap==="SIM") return alert("Nota já no SAP");

n.sap="SIM";

autoSalvar(); render();
}

function estornarSAP(){
let n = buscar(chaveSAP.value);
if(!n) return;

n.sap="NAO";

autoSalvar(); render();
}

function apagarUma(){
let chave = chaveApagar.value.trim();
if(!chave) return;

notas = notas.filter(n=>n.chave!==chave);
db.collection("notas").doc(chave).delete();

render();
}

function apagarTudo(){
let batch = db.batch();

notas.forEach(n=>{
batch.delete(db.collection("notas").doc(n.chave));
});

batch.commit();
notas=[];
render();
}

/* RENDER FINAL (COM TODAS AS CORES) */
function render(){

let header = `
<tr>
<th>UF</th><th>CHAVE</th><th>NUMERO</th>
<th>RAZAO</th><th>VALOR</th>
<th>SITUACAO</th><th>TIPO</th>
<th>EMISSAO</th>
<th>PEDIDO</th><th>RECEBIDO</th><th>SAP</th>
</tr>`;

tabela.innerHTML = header;
tabelaRecebidas.innerHTML = header;

notas.forEach(n=>{

let cls="";

if(n.situacao?.toUpperCase().includes("CANCELADA")) cls+=" cancelada";
else if(n.tipo?.toUpperCase().includes("ENTRADA")) cls+=" entrada";

if(n.recebido==="SIM") cls+=" recebidoOK";
if(n.sap==="SIM") cls+=" sapOK";

let linha = `
<tr class="${cls}">
<td>${n.uf||""}</td>
<td>${n.chave}</td>
<td>${n.numero}</td>
<td>${n.razaoEmit}</td>
<td>${n.valor}</td>
<td>${n.situacao}</td>
<td>${n.tipo}</td>
<td>${formatarData(n.emissao)}</td>
<td>${n.pedido||""}</td>
<td>${n.recebido||"NAO"}</td>
<td>${n.sap||"NAO"}</td>
</tr>`;

if(n.statusTela==="recebidas")
tabelaRecebidas.innerHTML += linha;
else
tabela.innerHTML += linha;

});

}
</script>
</body>
</html>
